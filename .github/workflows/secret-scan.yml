name: Secret Scan

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for common secrets
        run: |
          PATTERN='(password|passwd|secret|api[_-]?key|token|bearer|private[_-]?key|client_secret|refresh_token|access_token|authorization:|set-cookie|BEGIN PRIVATE KEY|BEGIN RSA PRIVATE KEY|email_mcp_imap_password)'
          if git grep -n -I -E "$PATTERN" -- .; then
            echo "Potential secrets detected. Remove before merging."
            exit 1
          fi
